services:
  - type: web
    name: bitsio-aiops-server
    env: node
    rootDir: .
    plan: free
    buildCommand: npm install && npm run build -w @bitsio/server
    startCommand: npm run start -w @bitsio/server
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_MODE
        value: production
      - key: PORT
        value: 8080
      - key: LLM_RUNTIME
        value: openrouter
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openai/gpt-4o-mini
      - key: CORS_ORIGIN
        value: https://<your-app>.vercel.app
      - key: FIRESTORE_ENABLED
        value: "false"
      - key: FIREBASE_PROJECT_ID
        value: bitsio-aiops
